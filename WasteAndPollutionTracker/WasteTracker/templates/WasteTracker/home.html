{% extends 'base.html' %}
{% load static %}
{% block content %}
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="{% static 'images/pexels-gustavo-fring-8770239.jpg' %}" class="d-block w-100" alt="Pollution" height="800" width="100">
    </div>
    <div class="carousel-item">
      <img src="{% static 'images/pexels-jan-van-der-wolf-11680885-10368942.jpg' %}" class="d-block w-100" alt="Pollution" height="800" width="100">
    </div>
    <div class="carousel-item">
      <img src="{% static 'images/pexels-yogendras31-2480797.jpg' %}" class="d-block w-100" alt="Pollution">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>


<section id="hero">
<div class="container">
<h1>Kenya Waste & Pollution Tracker</h1>

<p>
Tracking pollution problems across Kenya and helping communities
create a cleaner and healthier environment.
</p>

<button>Report Pollution</button>
</div>


</section>

{% endblock %}
